name: b2b-ai-native-ecommerce

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa-store"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  medusa-api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}@postgres:5432/medusa-store
      REDIS_URL: redis://redis:6379
      STORE_CORS: ${STORE_CORS:-http://localhost:3000,https://shop.b2b.com.ec}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9000,https://shop.b2b.com.ec}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:9000,https://shop.b2b.com.ec}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in Coolify}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set COOKIE_SECRET in Coolify}
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9000/store/b2b/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 20

  ecommerce-tools:
    build:
      context: .
      dockerfile: services/ecommerce-tools/Dockerfile
    restart: unless-stopped
    depends_on:
      medusa-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8787
      TOOLS_DATA_DIR: /data
      TOOLS_API_TOKEN: ${TOOLS_API_TOKEN:?Set TOOLS_API_TOKEN in Coolify}
      STORE_PUBLIC_URL: ${STORE_PUBLIC_URL:-https://shop.b2b.com.ec}
      MEDUSA_STORE_API_URL: http://medusa-api:9000
      MEDUSA_ADMIN_API_URL: http://medusa-api:9000
      MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
      MEDUSA_ADMIN_API_KEY: ${MEDUSA_ADMIN_API_KEY:-}
      ECOMMERCE_TAX_RATE: ${ECOMMERCE_TAX_RATE:-0.15}
      WHATSAPP_SELLER_NUMBER: ${WHATSAPP_SELLER_NUMBER:-593999999999}
      PAYPHONE_API_LINK_URL: ${PAYPHONE_API_LINK_URL:-https://pay.payphonetodoesposible.com/api/Links}
      PAYPHONE_TOKEN: ${PAYPHONE_TOKEN:-}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID:-}
      PAYPHONE_DRY_RUN: ${PAYPHONE_DRY_RUN:-true}
      META_CATALOG_BRAND: ${META_CATALOG_BRAND:-B2B}
    volumes:
      - tools-data:/data
    expose:
      - "8787"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_TOOLS_API_URL: ${NEXT_PUBLIC_TOOLS_API_URL:-https://shop.b2b.com.ec}
        NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://shop.b2b.com.ec}
    restart: unless-stopped
    depends_on:
      ecommerce-tools:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_TOOLS_API_URL: ${NEXT_PUBLIC_TOOLS_API_URL:-https://shop.b2b.com.ec}
      NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://shop.b2b.com.ec}
      TOOLS_API_INTERNAL_URL: http://ecommerce-tools:8787
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  tools-data:
