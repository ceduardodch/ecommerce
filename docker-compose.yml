name: b2b-ai-native-ecommerce

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa-store"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  medusa-api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}@postgres:5432/medusa-store
      REDIS_URL: redis://redis:6379
      STORE_CORS: ${STORE_CORS:-http://localhost:3000,https://shop.b2b.com.ec,https://cocina.b2b.com.ec,https://bienestar.b2b.com.ec,https://www.eter-niu.com,https://eter-niu.com,https://cocina.eter-niu.com,https://bienestar.eter-niu.com}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9000,https://shop.b2b.com.ec,https://cocina.b2b.com.ec,https://bienestar.b2b.com.ec,https://adminshop.b2b.com.ec,https://www.eter-niu.com,https://cocina.eter-niu.com,https://bienestar.eter-niu.com}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:9000,https://shop.b2b.com.ec,https://cocina.b2b.com.ec,https://bienestar.b2b.com.ec,https://adminshop.b2b.com.ec,https://www.eter-niu.com,https://cocina.eter-niu.com,https://bienestar.eter-niu.com}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in Coolify}
      COOKIE_SECRET: ${COOKIE_SECRET:?Set COOKIE_SECRET in Coolify}
      MEDUSA_RUN_MIGRATIONS_ON_START: ${MEDUSA_RUN_MIGRATIONS_ON_START:-false}
      # Recompra automática (CRM followups). Modo "draft" = solo encola, sin envíos.
      CRM_FOLLOWUP_DISPATCH_MODE: ${CRM_FOLLOWUP_DISPATCH_MODE:-draft}
      CRM_FOLLOWUP_ENABLED: ${CRM_FOLLOWUP_ENABLED:-true}
      CRM_FOLLOWUP_CRON: ${CRM_FOLLOWUP_CRON:-0 14 * * *}
      CRM_FOLLOWUP_MAX_PER_RUN: ${CRM_FOLLOWUP_MAX_PER_RUN:-20}
      CRM_FOLLOWUP_COOLDOWN_DAYS: ${CRM_FOLLOWUP_COOLDOWN_DAYS:-7}
      CRM_FOLLOWUP_RETRY_DAYS: ${CRM_FOLLOWUP_RETRY_DAYS:-7}
      CRM_FOLLOWUP_WINDOW: ${CRM_FOLLOWUP_WINDOW:-9-19}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-}
      OPENCLAW_GATEWAY_HOOK_PATH: ${OPENCLAW_GATEWAY_HOOK_PATH:-/hooks/agent}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN:-}
      # WhatsApp Cloud API (modo "meta"; dejar en blanco para no activar)
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
    ports:
      - "${MEDUSA_ADMIN_PORT_MAPPING:-127.0.0.1:18215:9000}"
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 20

  ecommerce-tools:
    build:
      context: .
      dockerfile: services/ecommerce-tools/Dockerfile
    restart: unless-stopped
    depends_on:
      medusa-api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8787
      TOOLS_DATA_DIR: /data
      CRM_BACKEND: ${CRM_BACKEND:-medusa}
      ALLOW_DEMO_CATALOG: ${ALLOW_DEMO_CATALOG:-false}
      TOOLS_API_TOKEN: ${TOOLS_API_TOKEN:?Set TOOLS_API_TOKEN in Coolify}
      STORE_PUBLIC_URL: ${STORE_PUBLIC_URL:-https://cocina.b2b.com.ec}
      COCINA_PUBLIC_URL: ${COCINA_PUBLIC_URL:-https://cocina.b2b.com.ec}
      BIENESTAR_PUBLIC_URL: ${BIENESTAR_PUBLIC_URL:-https://bienestar.b2b.com.ec}
      MEDUSA_STORE_API_URL: http://medusa-api:9000
      MEDUSA_ADMIN_API_URL: http://medusa-api:9000
      MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-}
      MEDUSA_ADMIN_API_KEY: ${MEDUSA_ADMIN_API_KEY:-}
      ECOMMERCE_TAX_RATE: ${ECOMMERCE_TAX_RATE:-0.15}
      WHATSAPP_SELLER_NUMBER: ${WHATSAPP_SELLER_NUMBER:-0979854915}
      PAYPHONE_API_LINK_URL: ${PAYPHONE_API_LINK_URL:-https://pay.payphonetodoesposible.com/api/Links}
      PAYPHONE_TOKEN: ${PAYPHONE_TOKEN:-}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID:-}
      PAYPHONE_DRY_RUN: ${PAYPHONE_DRY_RUN:-true}
      META_CATALOG_BRAND: "${META_CATALOG_BRAND:-Eter Niu Cocina}"
      META_API_VERSION: ${META_API_VERSION:-v23.0}
      PIXEL_ENABLED: ${PIXEL_ENABLED:-false}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_DATASET_ID: ${META_DATASET_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_CAPI_TEST_EVENT_CODE: ${META_CAPI_TEST_EVENT_CODE:-}
      # WhatsApp Cloud API — webhook + outbound (dejar en blanco para no activar)
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-}
      OPENCLAW_GATEWAY_HOOK_PATH: ${OPENCLAW_GATEWAY_HOOK_PATH:-/hooks/agent}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN:-}
    volumes:
      - tools-data:/data
    expose:
      - "8787"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

  admin-redirect:
    image: nginx:1.27-alpine
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
          listen 80;
          server_name _;
          absolute_redirect off;

          location = / {
            return 302 /app;
          }

          location / {
            return 404;
          }
        }
        NGINX
        nginx -g 'daemon off;'
    ports:
      - "${ADMIN_REDIRECT_PORT_MAPPING:-127.0.0.1:18216:80}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -S --spider http://127.0.0.1/ 2>&1 | grep -q 'HTTP/1.1 302'"]
      interval: 20s
      timeout: 5s
      retries: 10

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_TOOLS_API_URL: ${NEXT_PUBLIC_TOOLS_API_URL:-https://cocina.b2b.com.ec}
        NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://cocina.b2b.com.ec}
        NEXT_PUBLIC_COCINA_URL: ${NEXT_PUBLIC_COCINA_URL:-https://cocina.b2b.com.ec}
        NEXT_PUBLIC_BIENESTAR_URL: ${NEXT_PUBLIC_BIENESTAR_URL:-https://bienestar.b2b.com.ec}
        NEXT_PUBLIC_BRAND_URL: ${NEXT_PUBLIC_BRAND_URL:-https://www.eter-niu.com}
        NEXT_PUBLIC_PIXEL_ENABLED: ${NEXT_PUBLIC_PIXEL_ENABLED:-false}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
        NEXT_PUBLIC_PIXEL_CONSENT_MODE: ${NEXT_PUBLIC_PIXEL_CONSENT_MODE:-banner}
        NEXT_PUBLIC_WHATSAPP_SELLER_NUMBER: ${NEXT_PUBLIC_WHATSAPP_SELLER_NUMBER:-0979854915}
    restart: unless-stopped
    depends_on:
      ecommerce-tools:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      ALLOW_DEMO_CATALOG: ${ALLOW_DEMO_CATALOG:-false}
      NEXT_PUBLIC_TOOLS_API_URL: ${NEXT_PUBLIC_TOOLS_API_URL:-https://cocina.b2b.com.ec}
      NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-https://cocina.b2b.com.ec}
      NEXT_PUBLIC_COCINA_URL: ${NEXT_PUBLIC_COCINA_URL:-https://cocina.b2b.com.ec}
      NEXT_PUBLIC_BIENESTAR_URL: ${NEXT_PUBLIC_BIENESTAR_URL:-https://bienestar.b2b.com.ec}
      NEXT_PUBLIC_BRAND_URL: ${NEXT_PUBLIC_BRAND_URL:-https://www.eter-niu.com}
      DOMAIN_MIGRATION_REDIRECTS: ${DOMAIN_MIGRATION_REDIRECTS:-false}
      NEXT_PUBLIC_PIXEL_ENABLED: ${NEXT_PUBLIC_PIXEL_ENABLED:-false}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
      NEXT_PUBLIC_PIXEL_CONSENT_MODE: ${NEXT_PUBLIC_PIXEL_CONSENT_MODE:-banner}
      NEXT_PUBLIC_WHATSAPP_SELLER_NUMBER: ${NEXT_PUBLIC_WHATSAPP_SELLER_NUMBER:-0979854915}
      TOOLS_API_INTERNAL_URL: http://ecommerce-tools:8787
      TOOLS_API_TOKEN: ${TOOLS_API_TOKEN:?Set TOOLS_API_TOKEN in Coolify}
    ports:
      - "${STOREFRONT_PORT_MAPPING:-127.0.0.1:18214:3000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  tools-data:
